name: Android APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Test, lint, and build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Gradle 8.11.1
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://services.gradle.org/distributions/gradle-8.11.1-bin.zip -o "$RUNNER_TEMP/gradle-8.11.1-bin.zip"
          unzip -q "$RUNNER_TEMP/gradle-8.11.1-bin.zip" -d "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/gradle-8.11.1/bin" >> "$GITHUB_PATH"

      - name: Run unit tests
        run: gradle :app:testDebugUnitTest --stacktrace

      - name: Run Android lint
        run: gradle :app:lintDebug --stacktrace

      - name: Build debug APK
        run: gradle :app:assembleDebug --stacktrace

      - name: Prepare APK artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/apk
          cp app/build/outputs/apk/debug/app-debug.apk build/apk/telesis-debug.apk
          sha256sum build/apk/telesis-debug.apk > build/apk/telesis-debug.apk.sha256

      - name: Upload APK workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: telesis-debug-apk
          path: |
            build/apk/telesis-debug.apk
            build/apk/telesis-debug.apk.sha256
          if-no-files-found: error
          retention-days: 30
