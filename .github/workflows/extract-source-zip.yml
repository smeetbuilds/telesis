name: Extract source ZIP into repo root

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    name: Extract Telesis source ZIP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check ZIP exists
        id: zipcheck
        shell: bash
        run: |
          if [ -f "Telesis-latest-source.zip" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No Telesis-latest-source.zip found. Nothing to extract."
          fi

      - name: Extract ZIP to temporary directory
        if: steps.zipcheck.outputs.found == 'true'
        shell: bash
        run: |
          rm -rf /tmp/telesis-source
          mkdir -p /tmp/telesis-source
          unzip -q Telesis-latest-source.zip -d /tmp/telesis-source
          echo "Extracted files:"
          find /tmp/telesis-source -maxdepth 3 -type f | sort

      - name: Replace repository root with extracted project
        if: steps.zipcheck.outputs.found == 'true'
        shell: bash
        run: |
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a /tmp/telesis-source/. .
          rm -f Telesis-latest-source.zip
          chmod +x gradlew || true

      - name: Validate extracted Android project shape
        if: steps.zipcheck.outputs.found == 'true'
        shell: bash
        run: |
          test -f settings.gradle.kts
          test -f build.gradle.kts
          test -f app/build.gradle.kts
          test -f app/src/main/AndroidManifest.xml
          test -f .github/workflows/android-apk.yml
          grep -R "com.smeet.telesis" app/build.gradle.kts app/src/main/AndroidManifest.xml

      - name: Commit extracted source
        if: steps.zipcheck.outputs.found == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "feat: extract Telesis Android source into repo root"
            git push origin main
          fi
