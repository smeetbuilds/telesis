name: Android Signed Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    name: Build signed release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Gradle 8.11.1
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://services.gradle.org/distributions/gradle-8.11.1-bin.zip -o "$RUNNER_TEMP/gradle-8.11.1-bin.zip"
          unzip -q "$RUNNER_TEMP/gradle-8.11.1-bin.zip" -d "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/gradle-8.11.1/bin" >> "$GITHUB_PATH"

      - name: Check signing secrets
        id: signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${ANDROID_KEYSTORE_BASE64}" ] || [ -z "${ANDROID_KEYSTORE_PASSWORD}" ] || [ -z "${ANDROID_KEY_ALIAS}" ] || [ -z "${ANDROID_KEY_PASSWORD}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Signing secrets are missing. Skipping signed release build."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Decode signing keystore
        if: steps.signing.outputs.enabled == 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/telesis-signing"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/telesis-signing/release.jks"
          echo "ANDROID_KEYSTORE_FILE=$RUNNER_TEMP/telesis-signing/release.jks" >> "$GITHUB_ENV"
          echo "ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_PASSWORD=$ANDROID_KEY_PASSWORD" >> "$GITHUB_ENV"

      - name: Run release checks
        if: steps.signing.outputs.enabled == 'true'
        run: gradle :app:testDebugUnitTest :app:lintRelease --stacktrace

      - name: Build signed release APK
        if: steps.signing.outputs.enabled == 'true'
        run: gradle :app:assembleRelease --stacktrace

      - name: Prepare signed release asset
        if: steps.signing.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/release
          cp app/build/outputs/apk/release/app-release.apk build/release/telesis-release.apk
          sha256sum build/release/telesis-release.apk > build/release/telesis-release.apk.sha256

      - name: Upload signed release artifact
        if: steps.signing.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: telesis-signed-release-apk
          path: |
            build/release/telesis-release.apk
            build/release/telesis-release.apk.sha256
          if-no-files-found: error
          retention-days: 90

      - name: Publish signed GitHub release assets
        if: steps.signing.outputs.enabled == 'true' && startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" \
            build/release/telesis-release.apk \
            build/release/telesis-release.apk.sha256 \
            --title "Telesis ${GITHUB_REF_NAME}" \
            --notes "Signed release APK built from ${GITHUB_REF_NAME}." \
            --target "${GITHUB_SHA}" \
            --latest || \
          gh release upload "${GITHUB_REF_NAME}" \
            build/release/telesis-release.apk \
            build/release/telesis-release.apk.sha256 \
            --clobber
